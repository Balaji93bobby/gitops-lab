apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Balaji93bobby/gitops-lab.git'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
